version: '3.8'

services:
  db:
    image: postgres:15
    container_name: credit_approval_db
    environment:
      POSTGRES_DB: credit_approval
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: credit_approval_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./credit_approval
    container_name: credit_approval_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./credit_approval:/app
      - ./customer_data.xlsx:/app/data/customer_data.xlsx
      - ./loan_data.xlsx:/app/data/loan_data.xlsx
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://postgres:postgres@db:5432/credit_approval
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_DB=credit_approval
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: ./credit_approval
    container_name: credit_approval_celery
    command: celery -A credit_approval worker --loglevel=info
    volumes:
      - ./credit_approval:/app
      - ./customer_data.xlsx:/app/data/customer_data.xlsx
      - ./loan_data.xlsx:/app/data/loan_data.xlsx
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://postgres:postgres@db:5432/credit_approval
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_DB=credit_approval
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
